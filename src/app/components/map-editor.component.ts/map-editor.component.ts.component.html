<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="stacked">Entrada (Min/Max)</ion-label>
    <ion-row>
      <ion-col><ion-input type="number" [(ngModel)]="data.inMin"></ion-input></ion-col>
      <ion-col><ion-input type="number" [(ngModel)]="data.inMax"></ion-input></ion-col>
    </ion-row>
  </ion-item>
  <ion-item>
    <ion-label position="stacked">Salida (Min/Max)</ion-label>
    <ion-row>
      <ion-col><ion-input type="number" [(ngModel)]="data.outMin"></ion-input></ion-col>
      <ion-col><ion-input type="number" [(ngModel)]="data.outMax"></ion-input></ion-col>
    </ion-row>
  </ion-item>
  <ion-button expand="block" (click)="guardar()">Guardar</ion-button>
</ion-content>
